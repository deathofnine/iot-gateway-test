[pytest]
# 指定测试目录
testpaths = tests    
# 匹配测试文件       
python_files = test_*.py    
# 指定测试类
python_classes = Test*      
# 指定测试函数
python_functions = test_*   
#详细输出模式
#简化错误回溯信息
#严格检查标记
addopts =
    -v                      
    --tb=short              
    --strict-markers        
 # RPC相关的测试
 # MQTT相关的测试
 # 运行慢的测试
markers =
    rpc: RPC related tests     
    mqtt: MQTT related tests    
    slow: slow running tests    
#显示进度条
console_output_style = progress 